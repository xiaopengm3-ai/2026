<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unretweet All</title>
<style>
body{box-sizing:border-box;width:278px;min-width:258px;margin:0;padding:10px;color:#f1f5f9;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f0f0f 0%,#1a0a0a 55%,#0f0f0f 100%)}
.shell{overflow:hidden;padding:16px;border:1px solid rgba(239,68,68,0.2);border-radius:22px;background:rgba(15,15,15,0.9);box-shadow:0 18px 48px rgba(239,68,68,0.12)}
.header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
#iconImg{width:48px;height:48px;border-radius:16px;padding:2px;background:linear-gradient(135deg,#ef4444,#f97316);box-shadow:0 8px 20px rgba(239,68,68,0.25)}
#iconImg img{display:block;width:44px;height:44px;border-radius:14px;object-fit:cover}
.title{margin:0;font-size:15px;font-weight:750;line-height:1.3}
.subtitle{margin:2px 0 0;font-size:10px;color:#94a3b8;letter-spacing:0.04em}
#statusDot{display:inline-block;width:8px;height:8px;margin-right:6px;border-radius:50%;background:#64748b;vertical-align:middle}
#statusDot.active{background:#ef4444;box-shadow:0 0 0 4px rgba(239,68,68,0.2);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
#toggleBtn{width:100%;min-height:42px;border:0;border-radius:999px;color:#fff;background:linear-gradient(135deg,#dc2626 0%,#ea580c 100%);box-shadow:0 12px 28px rgba(220,38,38,0.3);font:inherit;font-size:13.5px;font-weight:750;cursor:pointer;transition:transform 140ms ease,box-shadow 140ms ease,filter 140ms ease}
#toggleBtn.active{background:linear-gradient(135deg,#7f1d1d 0%,#431407 100%);box-shadow:0 8px 20px rgba(127,29,29,0.25)}
#toggleBtn:hover{filter:brightness(1.08);transform:translateY(-1px)}
#toggleBtn:active{transform:translateY(0)}
.stats{margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;color:#94a3b8;min-height:18px}
.stats .count{color:#f87171;font-weight:700;font-variant-numeric:tabular-nums}
#scanInfo{font-size:10px;color:#64748b;text-align:center;margin-top:4px;min-height:14px}
</style>
</head>
<body>
<div class="shell">
<div class="header">
<div id="iconImg"><img src="icon48.png" alt=""></div>
<div>
<p class="title"><span id="statusDot"></span>Unretweet All</p>
<p class="subtitle">批量取消转推</p>
</div>
</div>
<button id="toggleBtn" type="button">开始清理转推</button>
<div class="stats" id="stats"></div>
<div id="scanInfo"></div>
</div>
<script src="popup.js"></script>
</body>
</html>
